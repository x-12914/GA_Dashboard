# Nginx server block for StoreBoost.
# This is a SEPARATE file — it does not touch your existing sites.
# Place at: /etc/nginx/sites-available/storeboost  then symlink into sites-enabled.
#
# server_name options (pick one, see DEPLOY.md):
#   - DuckDNS:   storeboost.duckdns.org
#   - nip.io:    <your.vps.ip>.nip.io     (no DNS setup needed)
#   - IP only:   _                         (matches any host)

server {
    listen 80;
    listen [::]:80;
    server_name storeboost.duckdns.org;   # <-- EDIT THIS

    # Don't buffer/limit large audit responses unnecessarily
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8500;   # must match gunicorn bind port
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Audit + PageSpeed calls can take a while
        proxy_connect_timeout 10s;
        proxy_read_timeout    90s;
        proxy_send_timeout    90s;
    }
}
